<!DOCTYPE html>
<html lang="es">
<head>
    <title>AI Weather Project</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .card { 
            border: 1px solid #ccc; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2); 
            background: white;
            max-width: 500px;
            width: 100%;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-top: 0;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }
        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
            min-height: 80px;
            display: none;
        }
        #resultado.visible {
            display: block;
        }
        .error {
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌤️ Consultor de Clima</h2>
        <input type="text" id="ciudad" placeholder="Ej: Buenos Aires, Madrid, México">
        <button id="btnConsultar">Consultar Clima</button>
        <div id="resultado"></div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
